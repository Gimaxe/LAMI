name: Build LAMI

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # permet de lancer le build à la main depuis l'onglet Actions

jobs:
  # ---------------------------------------------------------------- Windows .exe
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Installer Qt (Widgets + Network + WebSockets)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.2'
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: qtwebsockets

      - name: Environnement MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Installer Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Installer NuGet
        uses: NuGet/setup-nuget@v2

      - name: Récupérer le SDK WebView2
        shell: pwsh
        run: nuget install Microsoft.Web.WebView2 -Version 1.0.2210.55 -OutputDirectory ${{ github.workspace }}\nuget

      - name: Configurer (CMake + Ninja)
        shell: pwsh
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DLAMI_BUILD_TESTS=OFF
          "-DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR"
          "-DWEBVIEW2_DIR=${{ github.workspace }}/nuget/Microsoft.Web.WebView2.1.0.2210.55"

      - name: Compiler (backend + coquille)
        run: cmake --build build --target lami_backend lami_shell

      - name: Empaqueter
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item build/lami_backend.exe dist/
          Copy-Item build/lami_shell.exe   dist/
          Copy-Item -Recurse web dist/web
          windeployqt --release --no-translations --no-system-d3d-compiler dist/lami_backend.exe

      - name: Publier l'artéfact Windows (portable)
        uses: actions/upload-artifact@v4
        with:
          name: LAMI-windows
          path: dist

      - name: Lire la version
        id: ver
        shell: bash
        run: echo "version=$(grep -oP 'LAMI_VERSION = \"\K[0-9.]+' web/atraxe-ui.html)" >> "$GITHUB_OUTPUT"

      - name: Installer Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Construire l'installeur
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=${{ steps.ver.outputs.version }} installer\lami.iss

      - name: Publier l'installeur Windows
        uses: actions/upload-artifact@v4
        with:
          name: LAMI-windows-setup
          path: installer-out/*.exe

  # ------------------------------------------------------------------ Linux (bonus)
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dépendances
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential \
            qt6-base-dev qt6-websockets-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Configurer + compiler
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DLAMI_BUILD_TESTS=OFF
          cmake --build build -j$(nproc) --target lami_backend lami_shell

      - name: Empaqueter
        run: |
          mkdir -p dist
          cp build/lami_backend build/lami_shell dist/
          cp -r web dist/web
          cp installer/linux/install.sh dist/install.sh
          chmod +x dist/install.sh
          tar czf LAMI-linux.tar.gz -C dist .

      - name: Publier l'artéfact Linux
        uses: actions/upload-artifact@v4
        with:
          name: LAMI-linux
          path: LAMI-linux.tar.gz

  # -------------------------------------------- Release (distribution + màj auto)
  release:
    needs: [windows, linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Lire la version
        id: ver
        run: echo "version=$(grep -oP 'LAMI_VERSION = \"\K[0-9.]+' web/atraxe-ui.html)" >> "$GITHUB_OUTPUT"

      - name: Récupérer les artéfacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Préparer les fichiers de release
        run: |
          cd artifacts/LAMI-windows && zip -r ../../LAMI-windows-v${{ steps.ver.outputs.version }}.zip . && cd ../..
          cp artifacts/LAMI-linux/LAMI-linux.tar.gz LAMI-linux-v${{ steps.ver.outputs.version }}.tar.gz
          cp artifacts/LAMI-windows-setup/*.exe . || true

      - name: Créer / mettre à jour la Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: LAMI v${{ steps.ver.outputs.version }}
          files: |
            LAMI-Setup-v*.exe
            LAMI-windows-v*.zip
            LAMI-linux-v*.tar.gz
